name: Deploy Godot to Cloudflare Pages

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload WASM to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler r2 object put hishell-assets/index.wasm --file export/web/index.wasm --content-type application/wasm

      - name: Remove WASM from build output
        run: rm export/web/index.wasm

      - name: Create _worker.js
        run: |
          cat << 'WORKEREOF' > export/web/_worker.js
          export default {
            async fetch(request, env) {
              const url = new URL(request.url);

              if (url.pathname === "/index.wasm") {
                const object = await env.WASM_BUCKET.get("index.wasm");

                if (!object) {
                  return new Response("WASM file not found", { status: 404 });
                }

                return new Response(object.body, {
                  headers: {
                    "Content-Type": "application/wasm",
                    "Cross-Origin-Opener-Policy": "same-origin",
                    "Cross-Origin-Embedder-Policy": "require-corp",
                    "Cross-Origin-Resource-Policy": "cross-origin",
                    "Cache-Control": "public, max-age=31536000, immutable",
                  },
                });
              }

              return env.ASSETS.fetch(request);
            },
          };
          WORKEREOF

      - name: Create Headers
        run: |
          cd export/web
          cat << 'EOF' > _headers
          /*
            Cross-Origin-Opener-Policy: same-origin
            Cross-Origin-Embedder-Policy: require-corp
          EOF

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy export/web --project-name=hishell
